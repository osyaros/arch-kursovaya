services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://app:app@postgres:5432/app?sslmode=disable
      REDIS_ADDR: keydb:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - keydb
      - rabbitmq
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: notification-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - rabbitmq
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram-bot
    container_name: telegram-bot
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":8081"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "8081:8081"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres-archapp-lab4
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  keydb:
    image: eqalpha/keydb:x86_64_v6.3.4
    container_name: keydb-archapp-lab4
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-archapp-lab4
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_prometheus true"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: prometheus-archapp-lab4
    ports:
      - "9090:9090"
    volumes:
      - ./dockercompose/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./dockercompose/alert_rules.yml:/etc/prometheus/alert_rules.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana-archapp-lab4
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dockercompose/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.24.0
    container_name: alertmanager-archapp-lab4
    ports:
      - "9093:9093"
    volumes:
      - ./dockercompose/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - telegram-bot
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
  grafana-data:
